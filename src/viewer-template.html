<!DOCTYPE html>
<!-- ep — viewer artifact. Purpose-built calculator for one program.
     Reuses ep's styles + numbat-js evaluator, but no editor / drawer /
     export / share — just chip-driven inputs and computed outputs. -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>ep — viewer</title>
<script>
// First-paint theme — viewers always follow the recipient's OS preference
// (the sender's theme choice doesn't travel with the export).
(function(){
  try {
    var dark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  } catch (e) { document.documentElement.setAttribute('data-theme', 'dark'); }
})();
</script>
<style>
/* MARKER:STYLE */
</style>
</head>
<body>

<div class="app form viewer" id="app">
  <div class="hdr">
    <div class="hdr-left">
      <span class="name" title="ep — eval-print calculator (viewer)">ep</span>
      <span class="file" id="hdrFile">untitled</span>
    </div>
  </div>

  <div class="viewer-subtitle" id="viewerSubtitle" style="display:none"></div>

  <div class="panel" id="paramsPanel">
    <div class="panel-hdr">
      <span>inputs <span class="meta" id="paramMeta"></span></span>
    </div>
    <div class="chip-grid" id="chips"></div>
  </div>

  <div class="panel outputs" id="outputsPanel">
    <div class="panel-hdr">
      <span>outputs <span class="meta" id="outMeta"></span></span>
    </div>
    <div class="chip-grid" id="outChips"></div>
  </div>

  <div class="show-source">
    <button class="show-source-btn" id="showSourceBtn">show calculation ▾</button>
  </div>
  <pre class="source-view" id="sourceView" style="display:none"></pre>

  <div class="form-spacer"></div>

  <div class="viewer-footer">
    <a class="viewer-footer-link" id="viewerEditLink" href="https://gentropic.org/ep" target="_blank" rel="noopener">modify this calculation</a>
    <span class="viewer-footer-sep">·</span>
    <span class="viewer-footer-credit">made with <a href="https://gentropic.org/ep" target="_blank" rel="noopener">ep</a></span>
  </div>
</div>

<script>
/* MARKER:STATE_START */
const INITIAL_STATE = {
  name: 'untitled',
  body: [],
  ui: { paramsCollapsed: false, outputsCollapsed: false, formView: true, showSource: false },
};
/* MARKER:STATE_END */

'use strict';

/* MARKER:SCRIPT */
</script>

</body></html>
