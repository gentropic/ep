<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="ep">
  <!-- Square Switchboard-dark ground. No inset corner radius: Android
       adaptive icons + iOS/macOS dock + most OS launchers clip with
       their own shape (squircle, circle, rounded square, …), so
       pre-rounding here just leaves a visible gap inside the OS clip.
       Keep the canvas edge-to-edge filled and let the OS shape it. -->
  <rect width="512" height="512" fill="#15171A"/>

  <!-- Top-edge accent stripe — references the Switchboard equipment-
       marker aesthetic used across the GCU stack. Thin enough that it
       doesn't dominate; orange-on-dark stays legible from across a room. -->
  <rect x="0" y="0" width="512" height="14" fill="#D4672E"/>

  <!-- "ep" wordmark in monospace, Switchboard orange.
       Size 320 with central baseline sits the visual midline exactly on
       the canvas center. Falls through a stack so the icon renders
       consistently in any browser's font resolution. -->
  <text x="256" y="262" text-anchor="middle" dominant-baseline="central"
        font-family="ui-monospace, 'Space Mono', 'JetBrains Mono', Menlo, Consolas, monospace"
        font-weight="700" font-size="320" fill="#D4672E"
        letter-spacing="-12">ep</text>
</svg>
